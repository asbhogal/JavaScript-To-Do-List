<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="dist/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="app">
        <section class="greeting">
            <h3>To Do List</h3>
            <h2 class="title">
                Hello, <input 
                            type="text" 
                            id="name" 
                            placeholder="please type your name here">
            </h2>
        </section>
        <section class="create-todo">
            <p>The date is <span id="currentDate"></span></p>
            <p>The time is <span id="currentTime"></span></p>
            <form id="new-to-do-form">
                <p>What's on your to do list for today?</p>
                <input 
                    type="text" 
                    name="content" 
                    id="content" 
                    placeholder="e.g. Buy milk from the store">
                <h3>Select a category</h3>
                <div class="options">
                    <label>
                        <input 
                            type="radio" 
                            name="category" 
                            id="category-personal" 
                            value="personal">
                        <span class="bubble personal"></span>
                        <div>Personal</div>
                    </label>
                    <label>
                        <input 
                            type="radio" 
                            name="category" 
                            id="category-business" 
                            value="business">
                        <span class="bubble business"></span>
                        <div>Business</div>
                    </label>
                </div>
                <input type="submit" value="+">
            </form>
        </section>

        <section class="to-do-list">
            <h3>To Do</h3>
            <div class="list" id="to-do-list">
                <div class="to-do-item">
                    <label>
                        <input type="checkbox">
                        <span class="bubble business"></span>
                    </label>

                    <div class="to-do-content">
                        <input type="text" value="Submit annual reports" readonly>
                    </div>

                    <div class="actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </div>
                <div class="to-do-item">
                    <label>
                        <input type="checkbox">
                        <span class="bubble personal"></span>
                    </label>

                    <div class="to-do-content">
                        <input type="text" value="Buy pet food" readonly>
                    </div>

                    <div class="actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
