<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="dist/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="app">
        <section class="greeting">
            <h3>To Do List</h3>
            <h2 class="title">
                Hello, <input 
                            type="text" 
                            id="name" 
                            placeholder="please type your name here">
            </h2>
        </section>
        <section class="create-todo">
            <p>The date is <span id="currentDate"></span></p>
            <p>The time is <span id="currentTime"></span></p>
            <form id="new-to-do-form">
                <p>What's on your to do list for today?</p>
                <input 
                    type="text" 
                    name="content" 
                    id="content" 
                    placeholder="e.g. Buy milk from the store">
                <h3>Select a category</h3>
                <div class="options">
                    <label>
                        <input type="text" id="category-business">
                    </label>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
